<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300"> <!-- Auto-Reload alle 5 Min als Fallback -->
<title>Bestellstatus – GastroOrder</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg2:#141414;
  --border:#222;
  --text:#f5f5f5;
  --text2:#666;
  --accent:#ff6b35;
  --yellow:#f39c12;
  --yellow-bg:#1a1200;
  --yellow-border:#3d2d00;
  --blue:#3498db;
  --blue-bg:#001a2e;
  --blue-border:#003a6e;
  --green:#2ecc71;
  --green-bg:#001a0d;
  --green-border:#004d26;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:16px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.header-logo{font-size:22px;font-weight:700;color:var(--accent)}
.header-logo span{color:#555;font-weight:400}
.header-restaurant{font-size:16px;font-weight:600;color:var(--text)}
.header-time{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text2)}

/* MAIN CONTENT */
.content{
  flex:1;
  padding:32px 40px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* NO ORDERS */
.no-orders{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}
.no-orders-icon{font-size:80px;opacity:0.3}
.no-orders-text{font-size:28px;color:var(--text2);font-weight:300}

/* COLUMNS LAYOUT */
.columns{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:24px;
  overflow:hidden;
}
.column{display:flex;flex-direction:column;gap:12px;overflow:hidden}
.column-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  border-radius:10px;
  flex-shrink:0;
}
.column-header.neu{background:var(--yellow-bg);border:1px solid var(--yellow-border)}
.column-header.zubereitung{background:var(--blue-bg);border:1px solid var(--blue-border)}
.column-header.fertig{background:var(--green-bg);border:1px solid var(--green-border)}
.column-header-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.neu .column-header-dot{background:var(--yellow)}
.zubereitung .column-header-dot{background:var(--blue)}
.fertig .column-header-dot{background:var(--green)}
.column-header-title{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.neu .column-header-title{color:var(--yellow)}
.zubereitung .column-header-title{color:var(--blue)}
.fertig .column-header-title{color:var(--green)}
.column-header-count{margin-left:auto;font-size:14px;font-weight:600;opacity:0.6}

.column-cards{
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  flex:1;
  scrollbar-width:none;
}
.column-cards::-webkit-scrollbar{display:none}

/* ORDER CARD */
.order-card{
  border-radius:12px;
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  animation:fadeIn 0.4s ease;
  flex-shrink:0;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.order-card.neu{background:var(--yellow-bg);border:1px solid var(--yellow-border)}
.order-card.zubereitung{background:var(--blue-bg);border:1px solid var(--blue-border)}
.order-card.fertig{background:var(--green-bg);border:1px solid var(--green-border)}

.order-number{
  font-family:'DM Mono',monospace;
  font-size:36px;
  font-weight:700;
  letter-spacing:-1px;
}
.neu .order-number{color:var(--yellow)}
.zubereitung .order-number{color:var(--blue)}
.fertig .order-number{color:var(--green)}

.order-info{text-align:right}
.order-type{font-size:13px;font-weight:600;opacity:0.7;margin-bottom:2px}
.order-table{font-size:12px;opacity:0.5}

/* FOOTER */
.footer{
  padding:12px 40px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.footer-text{font-size:13px;color:var(--text2)}
.footer-pulse{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

/* ERROR / LOADING */
.center-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;text-align:center;
}
.spinner{width:40px;height:40px;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#1a0000;border:1px solid #4d0000;border-radius:12px;padding:32px;max-width:480px}
.error-box h2{color:#e74c3c;margin-bottom:12px}
.error-box p{color:#888;font-size:14px;line-height:1.6}
.error-box code{background:#0a0a0a;padding:4px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px;color:#aaa}
/* RESPONSIVE */
@media(max-width:768px){
  html,body{overflow:auto}
  .header{padding:10px 16px}
  .header-logo{font-size:16px}
  .header-restaurant{font-size:13px}
  .header-time{font-size:15px}
  .content{padding:12px 16px;overflow:auto}
  .columns{grid-template-columns:1fr;gap:12px}
  .column-header-title{font-size:13px}
  .order-card{padding:10px 14px}
  .order-number{font-size:28px}
  .footer{padding:8px 16px}
  .footer-text{font-size:11px}
  .no-orders-icon{font-size:48px}
  .no-orders-text{font-size:18px}
}

@media(max-width:480px){
  .header-restaurant{display:none}
  .columns{grid-template-columns:1fr}
  .column-header{padding:8px 12px}
  .order-card{padding:8px 12px}
  .order-number{font-size:32px}
  .order-info{display:none}
  .footer-text{display:none}
}
</style>
</head>
<body>

<div id="app" style="display:contents"></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDqui_H90Hvk1gtTD8rA1373F5UkLtCznQ",
  authDomain: "pxorder-42d11.firebaseapp.com",
  projectId: "pxorder-42d11",
  storageBucket: "pxorder-42d11.firebasestorage.app",
  messagingSenderId: "554775545689",
  appId: "1:554775545689:web:ed705cc6b9227ec5cc2e48"
});

const db = firebase.firestore();

// Get restaurant UID from URL
const params = new URLSearchParams(window.location.search);
const uid = params.get('id');

let orders = [];
let restaurantName = '';
let unsubscribe = null;

// Clock
function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);

// Init
async function init() {
  if (!uid) {
    renderError('Kein Restaurant angegeben', 'Bitte öffne diesen Link mit einer gültigen Restaurant-ID.<br><br>Beispiel: <code>kundendisplay.html?id=DEINE-ID</code>');
    return;
  }

  // Load restaurant name
  try {
    const doc = await db.collection('restaurants').doc(uid).get();
    if (!doc.exists) {
      renderError('Restaurant nicht gefunden', 'Die Restaurant-ID ist ungültig oder wurde gelöscht.');
      return;
    }
    restaurantName = doc.data().restaurantName || 'Restaurant';
  } catch(e) {
    renderError('Verbindungsfehler', e.message);
    return;
  }

  renderLayout();
  startListener();
}

function startListener() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('restaurants').doc(uid).collection('orders')
    .onSnapshot(snap => {
      orders = snap.docs.map(d => ({id:d.id,...d.data()}))
        .filter(o => o.status === 'Neu' || o.status === 'In Zubereitung' || o.status === 'Fertig')
        .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      renderCards();
    }, err => {
      console.error(err);
    });
}

function renderError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="center-screen">
      <div class="error-box">
        <h2>⚠️ ${title}</h2>
        <p>${msg}</p>
      </div>
    </div>
  `;
}

function renderLayout() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-logo">Gastro<span>Order</span></div>
      <div class="header-restaurant">${restaurantName}</div>
      <div class="header-time" id="clock">--:--:--</div>
    </div>
    <div class="content" id="content">
      <div class="center-screen"><div class="spinner"></div></div>
    </div>
    <div class="footer">
      <div class="footer-text">Bitte entnehmen Sie Ihre Bestellung nur bei <strong>Abholbereit ✅</strong></div>
      <div class="footer-pulse"><div class="pulse-dot"></div> Live</div>
    </div>
  `;
  updateClock();
}

function renderCards() {
  const content = document.getElementById('content');
  if (!content) return;

  const isMobile = window.innerWidth <= 480;
  const neu = orders.filter(o => o.status === 'Neu');
  const zubereitung = orders.filter(o => o.status === 'In Zubereitung');
  const fertig = orders.filter(o => o.status === 'Fertig');

  if (orders.length === 0) {
    content.innerHTML = `
      <div class="no-orders">
        <div class="no-orders-icon">✅</div>
        <div class="no-orders-text">Alle Bestellungen abgeholt</div>
      </div>
    `;
    return;
  }

  if (isMobile) {
    // Mobile: alle Bestellungen in einer Liste, nur Nummer + Farbe
    content.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${fertig.length>0?`
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);padding:4px 0">✅ Abholbereit (${fertig.length})</div>
          ${fertig.map(o=>`
            <div class="order-card fertig" style="justify-content:center">
              <div class="order-number" style="font-size:42px">${o.orderNumber||'B-?'}</div>
            </div>
          `).join('')}
        `:''}
        ${zubereitung.length>0?`
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue);padding:4px 0;margin-top:8px">👨‍🍳 In Zubereitung (${zubereitung.length})</div>
          ${zubereitung.map(o=>`
            <div class="order-card zubereitung" style="justify-content:center">
              <div class="order-number" style="font-size:42px">${o.orderNumber||'B-?'}</div>
            </div>
          `).join('')}
        `:''}
        ${neu.length>0?`
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);padding:4px 0;margin-top:8px">⏳ Wartet (${neu.length})</div>
          ${neu.map(o=>`
            <div class="order-card neu" style="justify-content:center">
              <div class="order-number" style="font-size:42px">${o.orderNumber||'B-?'}</div>
            </div>
          `).join('')}
        `:''}
      </div>
    `;
    return;
  }

  // Desktop: 3 Spalten
  content.innerHTML = `
    <div class="columns">
      <div class="column">
        <div class="column-header neu">
          <div class="column-header-dot"></div>
          <div class="column-header-title">Wartet</div>
          <div class="column-header-count">${neu.length}</div>
        </div>
        <div class="column-cards">
          ${neu.length === 0 ? '<div style="color:#333;font-size:14px;text-align:center;padding:20px">–</div>' : ''}
          ${neu.map(o => renderCard(o, 'neu')).join('')}
        </div>
      </div>
      <div class="column">
        <div class="column-header zubereitung">
          <div class="column-header-dot"></div>
          <div class="column-header-title">In Zubereitung</div>
          <div class="column-header-count">${zubereitung.length}</div>
        </div>
        <div class="column-cards">
          ${zubereitung.length === 0 ? '<div style="color:#333;font-size:14px;text-align:center;padding:20px">–</div>' : ''}
          ${zubereitung.map(o => renderCard(o, 'zubereitung')).join('')}
        </div>
      </div>
      <div class="column">
        <div class="column-header fertig">
          <div class="column-header-dot"></div>
          <div class="column-header-title">Abholbereit ✅</div>
          <div class="column-header-count">${fertig.length}</div>
        </div>
        <div class="column-cards">
          ${fertig.length === 0 ? '<div style="color:#333;font-size:14px;text-align:center;padding:20px">–</div>' : ''}
          ${fertig.map(o => renderCard(o, 'fertig')).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderCard(o, cls) {
  return `
    <div class="order-card ${cls}">
      <div class="order-number">${o.orderNumber || 'B-?'}</div>
      <div class="order-info">
        <div class="order-type">${o.type === 'abholung' ? '🥡 Abholung' : '🪑 Vor-Ort'}</div>
        ${o.table ? `<div class="order-table">${o.table}</div>` : ''}
      </div>
    </div>
  `;
}

init();
window.addEventListener('resize', () => { if(orders.length >= 0) renderCards(); });
</script>
</body>
</html>
